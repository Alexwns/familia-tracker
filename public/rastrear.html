<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compartir ubicación — Familia</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e8e8f0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2a2d3e;
      border-radius: 20px;
      padding: 32px 28px;
      max-width: 360px;
      width: 100%;
      text-align: center;
    }

    .icon {
      font-size: 52px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #ffffff;
    }

    .subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .status-box {
      background: #12151f;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      border: 1px solid #1e2130;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-size: 13px;
    }

    .status-row:not(:last-child) {
      border-bottom: 1px solid #1e2130;
    }

    .label { color: #666; }
    .value { color: #c8c8e0; font-weight: 500; }
    .value.ok { color: #4ade80; }
    .value.error { color: #f87171; }
    .value.waiting { color: #facc15; }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-start {
      background: #4f46e5;
      color: white;
    }

    .btn-start:hover { background: #4338ca; }

    .btn-stop {
      background: #1e2130;
      color: #f87171;
      border: 1px solid #2a2d3e;
    }

    .btn-stop:hover { background: #16192a; }

    .pulse {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    .note {
      font-size: 12px;
      color: #444;
      margin-top: 16px;
      line-height: 1.5;
    }

    #countdown {
      font-size: 12px;
      color: #555;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="icon">📍</div>
  <h1>Compartir mi ubicación</h1>
  <p class="subtitle">Tu familia podrá ver dónde estás.<br>Nada se comparte sin que lo actives tú.</p>

  <div class="status-box">
    <div class="status-row">
      <span class="label">Estado</span>
      <span class="value" id="st-estado">Inactivo</span>
    </div>
    <div class="status-row">
      <span class="label">Último envío</span>
      <span class="value" id="st-ultimo">—</span>
    </div>
    <div class="status-row">
      <span class="label">Precisión</span>
      <span class="value" id="st-precision">—</span>
    </div>
    <div class="status-row">
      <span class="label">Batería</span>
      <span class="value" id="st-bateria">—</span>
    </div>
  </div>

  <button class="btn btn-start" id="btn" onclick="toggle()">Activar rastreo</button>
  <div id="countdown"></div>
  <p class="note">Manda tu posición cada 5 minutos.<br>Cierra la pestaña para detenerlo.</p>
</div>

<script>
  const params = new URLSearchParams(location.search);
  const TOKEN = params.get('token');
  const INTERVAL_MS = 5 * 60 * 1000; // 5 minutos

  let activo = false;
  let timer = null;
  let countdownTimer = null;
  let nextEnvio = null;

  if (!TOKEN) {
    document.querySelector('.card').innerHTML =
      '<p style="color:#f87171;padding:20px">Link inválido. Pide un nuevo link a tu familiar.</p>';
  }

  function toggle() {
    if (!activo) iniciar(); else detener();
  }

  async function iniciar() {
    activo = true;
    document.getElementById('btn').className = 'btn btn-stop';
    document.getElementById('btn').textContent = 'Detener rastreo';
    document.getElementById('st-estado').innerHTML = '<span class="pulse"></span>Activo';
    document.getElementById('st-estado').className = 'value ok';
    await enviarUbicacion();
    timer = setInterval(enviarUbicacion, INTERVAL_MS);
    iniciarCountdown();
  }

  function detener() {
    activo = false;
    clearInterval(timer);
    clearInterval(countdownTimer);
    document.getElementById('btn').className = 'btn btn-start';
    document.getElementById('btn').textContent = 'Activar rastreo';
    document.getElementById('st-estado').textContent = 'Inactivo';
    document.getElementById('st-estado').className = 'value';
    document.getElementById('countdown').textContent = '';
  }

  function iniciarCountdown() {
    nextEnvio = Date.now() + INTERVAL_MS;
    clearInterval(countdownTimer);
    countdownTimer = setInterval(() => {
      const restante = Math.max(0, Math.round((nextEnvio - Date.now()) / 1000));
      const min = Math.floor(restante / 60);
      const seg = restante % 60;
      document.getElementById('countdown').textContent =
        `Próximo envío en ${min}:${String(seg).padStart(2,'0')}`;
      if (restante === 0) {
        nextEnvio = Date.now() + INTERVAL_MS;
      }
    }, 1000);
  }

  async function enviarUbicacion() {
    try {
      const pos = await new Promise((ok, err) =>
        navigator.geolocation.getCurrentPosition(ok, err, {
          enableHighAccuracy: false,   // ahorra batería
          timeout: 10000,
          maximumAge: 60000
        })
      );

      const bateria = navigator.getBattery
        ? Math.round((await navigator.getBattery()).level * 100)
        : null;

      const resp = await fetch('/ubicacion', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          token: TOKEN,
          lat: pos.coords.latitude,
          lng: pos.coords.longitude,
          precision: Math.round(pos.coords.accuracy),
          bateria
        })
      });

      if (resp.ok) {
        document.getElementById('st-ultimo').textContent =
          new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('st-precision').textContent =
          `±${Math.round(pos.coords.accuracy)} m`;
        document.getElementById('st-bateria').textContent =
          bateria != null ? `${bateria}%` : 'N/D';
        nextEnvio = Date.now() + INTERVAL_MS;
      }
    } catch (e) {
      document.getElementById('st-estado').innerHTML = '⚠ Error de GPS';
      document.getElementById('st-estado').className = 'value error';
    }
  }
</script>

</body>
</html>
