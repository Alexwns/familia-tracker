<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel familiar — Mapa</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3e;
      --text: #e8e8f0;
      --muted: #666;
      --accent: #6366f1;
      --green: #4ade80;
      --red: #f87171;
      --yellow: #facc15;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Login ── */
    #login-screen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 28px;
      max-width: 340px;
      width: 100%;
    }

    .login-card h1 { font-size: 22px; margin-bottom: 6px; }
    .login-card p { font-size: 13px; color: var(--muted); margin-bottom: 24px; }

    input[type=password], input[type=text] {
      width: 100%;
      background: #12151f;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 12px;
      outline: none;
    }

    input:focus { border-color: var(--accent); }

    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: var(--accent);
      color: white;
      transition: background 0.2s;
    }

    .btn:hover { background: #4f46e5; }
    .btn.secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      margin-top: 8px;
    }
    .btn.secondary:hover { background: #12151f; }
    .btn.danger { background: #7f1d1d; color: var(--red); border: 1px solid #991b1b; margin-top: 8px; }

    #login-err { color: var(--red); font-size: 13px; margin-top: 8px; display: none; }

    /* ── App ── */
    #app { display: none; flex-direction: column; flex: 1; overflow: hidden; }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .topbar h1 { font-size: 16px; font-weight: 600; flex: 1; }

    .tabs {
      display: flex;
      gap: 4px;
    }

    .tab {
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      color: var(--muted);
      border: none;
      background: transparent;
      font-weight: 500;
      transition: all 0.15s;
    }

    .tab.active {
      background: var(--accent);
      color: white;
    }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .refresh-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.2s;
    }
    .refresh-btn:hover { color: var(--text); }

    .members-list { overflow-y: auto; flex: 1; }

    .member-item {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .member-item:hover { background: #12151f; }
    .member-item.selected { background: #1e2040; border-left: 2px solid var(--accent); }

    .member-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .member-info { flex: 1; min-width: 0; }
    .member-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .member-time { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .member-bat {
      font-size: 11px;
      color: var(--muted);
    }

    /* Mapa */
    #map { flex: 1; }

    /* Panel agregar */
    #panel-agregar {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: none;
    }

    .section-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px;
      max-width: 480px;
      margin-bottom: 20px;
    }

    .section-card h2 { font-size: 15px; margin-bottom: 16px; }

    .link-box {
      background: #12151f;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: var(--green);
      word-break: break-all;
      margin-bottom: 10px;
      cursor: pointer;
      user-select: all;
    }

    .link-hint { font-size: 11px; color: var(--muted); }

    .member-manage-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .member-manage-item:last-child { border-bottom: none; }
    .member-manage-item span { flex: 1; font-size: 13px; }

    .del-btn {
      background: none;
      border: 1px solid #3f1f1f;
      color: var(--red);
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }

    .del-btn:hover { background: #1a0f0f; }

    @media (max-width: 600px) {
      .sidebar { width: 200px; }
    }
  </style>
</head>
<body>

<!-- ── Login ───────────────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <h1>🏠 Familia Tracker</h1>
    <p>Panel de administración. Solo tú tienes acceso.</p>
    <input type="password" id="key-input" placeholder="Clave de administrador" onkeydown="if(event.key==='Enter')login()">
    <button class="btn" onclick="login()">Entrar</button>
    <p id="login-err">Clave incorrecta</p>
  </div>
</div>

<!-- ── App ─────────────────────────────────────────────────────────────── -->
<div id="app">
  <div class="topbar">
    <h1>🏠 Familia Tracker</h1>
    <div class="tabs">
      <button class="tab active" onclick="showTab('mapa')">Mapa</button>
      <button class="tab" onclick="showTab('agregar')">Gestionar</button>
    </div>
  </div>

  <!-- Vista mapa -->
  <div class="main" id="vista-mapa">
    <div class="sidebar">
      <div class="sidebar-header">
        Familiares
        <button class="refresh-btn" onclick="cargarMapa()" title="Actualizar">↻</button>
      </div>
      <div class="members-list" id="members-list">
        <div style="padding:20px;color:var(--muted);font-size:13px">Cargando...</div>
      </div>
    </div>
    <div id="map"></div>
  </div>

  <!-- Vista gestionar -->
  <div id="panel-agregar">
    <div class="section-card">
      <h2>Agregar familiar</h2>
      <input type="text" id="nuevo-nombre" placeholder="Nombre (ej: Mamá, Hermano)">
      <button class="btn" onclick="crearMiembro()">Crear y copiar link</button>
      <div id="nuevo-link" style="margin-top:14px;display:none">
        <div class="link-box" id="link-text" onclick="copiarLink()"></div>
        <p class="link-hint">Toca para copiar. Manda este link a tu familiar por WhatsApp.</p>
      </div>
    </div>

    <div class="section-card">
      <h2>Familiares registrados</h2>
      <div id="lista-miembros">
        <div style="color:var(--muted);font-size:13px">Cargando...</div>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let ADMIN_KEY = '';
let mapa = null;
let markers = {};
let colores = ['#6366f1','#4ade80','#f59e0b','#f87171','#38bdf8','#a78bfa','#fb923c'];
let colorMap = {};
let colorIdx = 0;

// ── Login ──────────────────────────────────────────────────────────────
function login() {
  const k = document.getElementById('key-input').value;
  if (!k) return;
  ADMIN_KEY = k;
  fetch('/admin/miembros', { headers: { 'x-admin-key': k } })
    .then(r => {
      if (r.ok) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        iniciarMapa();
        cargarMapa();
        setInterval(cargarMapa, 30000);
      } else {
        document.getElementById('login-err').style.display = 'block';
      }
    });
}

// ── Tabs ───────────────────────────────────────────────────────────────
function showTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'mapa') || (i === 1 && tab === 'agregar'));
  });
  document.getElementById('vista-mapa').style.display = tab === 'mapa' ? 'flex' : 'none';
  document.getElementById('panel-agregar').style.display = tab === 'agregar' ? 'block' : 'none';
  if (tab === 'agregar') cargarListaMiembros();
  if (tab === 'mapa') setTimeout(() => mapa && mapa.invalidateSize(), 100);
}

// ── Mapa ───────────────────────────────────────────────────────────────
function iniciarMapa() {
  mapa = L.map('map', { zoomControl: true }).setView([20.66, -103.35], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 19
  }).addTo(mapa);
}

async function cargarMapa() {
  try {
    const r = await fetch('/admin/mapa', { headers: { 'x-admin-key': ADMIN_KEY } });
    const datos = await r.json();
    actualizarSidebar(datos);
    actualizarMarkers(datos);
  } catch(e) { console.error(e); }
}

function getColor(id) {
  if (!colorMap[id]) {
    colorMap[id] = colores[colorIdx % colores.length];
    colorIdx++;
  }
  return colorMap[id];
}

function actualizarSidebar(datos) {
  const list = document.getElementById('members-list');
  if (!datos.length) {
    list.innerHTML = '<div style="padding:20px;color:var(--muted);font-size:13px">Sin familiares aún.<br>Ve a Gestionar para agregar.</div>';
    return;
  }
  list.innerHTML = datos.map(d => {
    const color = getColor(d.id);
    const tiempo = d.enviado_en ? tiempoRelativo(d.enviado_en) : 'Sin datos';
    const bat = d.bateria != null ? ` · 🔋${d.bateria}%` : '';
    return `
      <div class="member-item" onclick="centrarEn('${d.id}')">
        <div class="member-dot" style="background:${color}"></div>
        <div class="member-info">
          <div class="member-name">${d.nombre}</div>
          <div class="member-time">${tiempo}${bat}</div>
        </div>
      </div>`;
  }).join('');
}

function actualizarMarkers(datos) {
  datos.forEach(d => {
    if (!d.lat) return;
    const color = getColor(d.id);
    const icon = L.divIcon({
      className: '',
      html: `<div style="
        background:${color};
        border:2px solid white;
        border-radius:50% 50% 50% 0;
        transform:rotate(-45deg);
        width:22px;height:22px;
        box-shadow:0 2px 6px rgba(0,0,0,.4)
      "></div>`,
      iconSize: [22, 22],
      iconAnchor: [11, 22]
    });

    const popup = `<b>${d.nombre}</b><br>
      ${tiempoRelativo(d.enviado_en)}<br>
      ${d.bateria != null ? '🔋 ' + d.bateria + '%' : ''}
      ${d.precision_m ? '<br>±' + Math.round(d.precision_m) + ' m' : ''}`;

    if (markers[d.id]) {
      markers[d.id].setLatLng([d.lat, d.lng]).setPopupContent(popup);
    } else {
      markers[d.id] = L.marker([d.lat, d.lng], { icon }).addTo(mapa).bindPopup(popup);
    }
  });
}

function centrarEn(id) {
  if (markers[id]) {
    mapa.setView(markers[id].getLatLng(), 15);
    markers[id].openPopup();
  }
}

// ── Gestionar ──────────────────────────────────────────────────────────
async function crearMiembro() {
  const nombre = document.getElementById('nuevo-nombre').value.trim();
  if (!nombre) return;
  const r = await fetch('/admin/miembros', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-admin-key': ADMIN_KEY },
    body: JSON.stringify({ nombre })
  });
  const data = await r.json();
  document.getElementById('link-text').textContent = data.link;
  document.getElementById('nuevo-link').style.display = 'block';
  document.getElementById('nuevo-nombre').value = '';
  navigator.clipboard.writeText(data.link).catch(() => {});
  cargarListaMiembros();
}

function copiarLink() {
  const txt = document.getElementById('link-text').textContent;
  navigator.clipboard.writeText(txt).then(() => {
    document.getElementById('link-text').textContent = '✓ Copiado!';
    setTimeout(() => document.getElementById('link-text').textContent = txt, 1500);
  });
}

async function cargarListaMiembros() {
  const r = await fetch('/admin/miembros', { headers: { 'x-admin-key': ADMIN_KEY } });
  const lista = await r.json();
  const el = document.getElementById('lista-miembros');
  if (!lista.length) {
    el.innerHTML = '<div style="color:var(--muted);font-size:13px">Sin familiares aún.</div>';
    return;
  }
  el.innerHTML = lista.map(m => `
    <div class="member-manage-item">
      <span>${m.nombre}</span>
      <button class="del-btn" onclick="eliminarMiembro('${m.id}','${m.nombre}')">Eliminar</button>
    </div>
  `).join('');
}

async function eliminarMiembro(id, nombre) {
  if (!confirm(`¿Eliminar a ${nombre}? Se borrarán todos sus datos.`)) return;
  await fetch('/admin/miembros/' + id, {
    method: 'DELETE',
    headers: { 'x-admin-key': ADMIN_KEY }
  });
  cargarListaMiembros();
  cargarMapa();
}

// ── Utilidades ─────────────────────────────────────────────────────────
function tiempoRelativo(fecha) {
  const diff = (Date.now() - new Date(fecha + 'Z')) / 1000;
  if (diff < 60) return 'Hace un momento';
  if (diff < 3600) return `Hace ${Math.floor(diff/60)} min`;
  if (diff < 86400) return `Hace ${Math.floor(diff/3600)} h`;
  return `Hace ${Math.floor(diff/86400)} días`;
}
</script>
</body>
</html>
