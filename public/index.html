<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel familiar — Mapa</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3e;
      --text: #e8e8f0;
      --muted: #666;
      --accent: #6366f1;
      --green: #4ade80;
      --red: #f87171;
      --yellow: #facc15;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Login ── */
    #login-screen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 28px;
      max-width: 340px;
      width: 100%;
    }

    .login-card h1 { font-size: 22px; margin-bottom: 6px; }
    .login-card p { font-size: 13px; color: var(--muted); margin-bottom: 24px; }

    input[type=password], input[type=text] {
      width: 100%;
      background: #12151f;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 12px;
      outline: none;
    }

    input:focus { border-color: var(--accent); }

    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: var(--accent);
      color: white;
      transition: background 0.2s;
    }

    .btn:hover { background: #4f46e5; }
    .btn.secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      margin-top: 8px;
    }
    .btn.secondary:hover { background: #12151f; }
    .btn.danger { background: #7f1d1d; color: var(--red); border: 1px solid #991b1b; margin-top: 8px; }

    #login-err { color: var(--red); font-size: 13px; margin-top: 8px; display: none; }

    /* ── App ── */
    #app { display: none; flex-direction: column; flex: 1; overflow: hidden; }
/* ── Topbar ───────────────────────────────────── */
.topbar {
  background: rgba(26,29,39,.88);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,.05);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  z-index: 1000;
}

.topbar h1 {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: .3px;
}

.tabs {
  display: flex;
  gap: 6px;
  background: #11141d;
  padding: 4px;
  border-radius: 12px;
  border: 1px solid var(--border);
}

.tab {
  padding: 8px 16px;
  border-radius: 10px;
  font-size: 13px;
  cursor: pointer;
  color: #9ca3af;
  border: none;
  background: transparent;
  font-weight: 600;
  transition: .2s;
}

.tab:hover {
  color: white;
}

.tab.active {
  background: linear-gradient(135deg,#6366f1,#4f46e5);
  color: white;
  box-shadow: 0 4px 14px rgba(99,102,241,.3);
}

/* ── Layout ───────────────────────────────────── */
.main {
  flex: 1;
  position: relative;
  overflow: hidden;
}

/* ── Sidebar ──────────────────────────────────── */
.sidebar {
  position: absolute;
  top: 16px;
  left: 16px;
  width: 320px;
  max-height: calc(100% - 32px);
  background: rgba(26,29,39,.92);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,.06);
  border-radius: 22px;
  overflow: hidden;
  z-index: 1000;
  box-shadow:
    0 10px 30px rgba(0,0,0,.45),
    inset 0 1px 0 rgba(255,255,255,.03);

  transition:
    transform .35s ease,
    opacity .25s ease;
}

/* Contraído */
.sidebar.collapsed {
  transform: translateX(-115%);
  opacity: 0;
  pointer-events: none;
}

.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid rgba(255,255,255,.05);
  font-size: 11px;
  color: #9ca3af;
  text-transform: uppercase;
  letter-spacing: .12em;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 700;
}

.refresh-btn {
  background: rgba(255,255,255,.05);
  border: none;
  color: #d1d5db;
  cursor: pointer;
  width: 34px;
  height: 34px;
  border-radius: 10px;
  font-size: 15px;
  transition: .2s;
}

.refresh-btn:hover {
  background: rgba(255,255,255,.12);
  transform: rotate(90deg);
}

.members-list {
  overflow-y: auto;
  max-height: calc(100vh - 180px);
  padding: 8px;
}

/* Scroll bonito */
.members-list::-webkit-scrollbar {
  width: 6px;
}

.members-list::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,.1);
  border-radius: 10px;
}

.member-item {
  padding: 14px;
  border-radius: 16px;
  cursor: pointer;
  transition: .2s;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 6px;
  border: 1px solid transparent;
}

.member-item:hover {
  background: rgba(255,255,255,.04);
  border-color: rgba(255,255,255,.05);
  transform: translateY(-1px);
}

.member-item.selected {
  background: rgba(99,102,241,.14);
  border-color: rgba(99,102,241,.3);
}

.member-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
  box-shadow: 0 0 12px currentColor;
}

.member-info {
  flex: 1;
  min-width: 0;
}

.member-name {
  font-size: 14px;
  font-weight: 600;
  color: white;
}

.member-time {
  font-size: 11px;
  color: #9ca3af;
  margin-top: 4px;
}

.member-bat {
  font-size: 11px;
  color: #9ca3af;
}

/* ── Botón flotante ───────────────────────────── */
.sidebar-toggle {
  position: absolute;
  top: 18px;
  left: 18px;
  z-index: 1200;

  width: 48px;
  height: 48px;

  border: none;
  border-radius: 16px;

  background: rgba(26,29,39,.92);
  backdrop-filter: blur(10px);

  color: white;
  font-size: 20px;
  cursor: pointer;

  box-shadow: 0 8px 25px rgba(0,0,0,.35);

  transition: .25s;
}

.sidebar-toggle:hover {
  transform: scale(1.05);
  background: rgba(40,44,58,.95);
}

/* ── Mapa ─────────────────────────────────────── */
#map {
  width: 100%;
  height: 100%;
  z-index: 1;
}

/* ── Panel gestionar ──────────────────────────── */
#panel-agregar {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  background:
    radial-gradient(circle at top left,#1d2333 0%,transparent 30%),
    var(--bg);
}

.section-card {
  background: rgba(26,29,39,.9);
  border: 1px solid rgba(255,255,255,.05);
  border-radius: 24px;
  padding: 24px;
  max-width: 520px;
  margin-bottom: 20px;
  backdrop-filter: blur(12px);
  box-shadow: 0 10px 30px rgba(0,0,0,.25);
}

.section-card h2 {
  font-size: 16px;
  margin-bottom: 18px;
}

/* ── Responsive ───────────────────────────────── */
@media (max-width: 768px) {

  .topbar {
    padding: 10px 12px;
  }

  .topbar h1 {
    font-size: 14px;
  }

  .tabs {
    width: 100%;
    justify-content: center;
  }

  .sidebar {
    width: calc(100% - 24px);
    left: 12px;
    top: 74px;
    max-height: 55vh;
    border-radius: 22px;
  }

  .sidebar-toggle {
    top: 84px;
    left: 20px;
    width: 46px;
    height: 46px;
  }

  .member-item {
    padding: 13px;
  }

  .member-name {
    font-size: 13px;
  }

  .member-time {
    font-size: 10px;
  }

  .section-card {
    padding: 20px;
    border-radius: 20px;
  }
}

  </style>
</head>
<body>

<!-- ── Login ───────────────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <h1>🏠 Familia Tracker</h1>
    <p>Panel de administración. Solo tú tienes acceso.</p>
    <input type="password" id="key-input" placeholder="Clave de administrador" onkeydown="if(event.key==='Enter')login()">
    <button class="btn" onclick="login()">Entrar</button>
    <p id="login-err">Clave incorrecta</p>
  </div>
</div>

<!-- ── App ─────────────────────────────────────────────────────────────── -->
<div id="app">
  <div class="topbar">
    <h1>🏠 Familia Tracker</h1>
    <div class="tabs">
      <button class="tab active" onclick="showTab('mapa')">Mapa</button>
      <button class="tab" onclick="showTab('agregar')">Gestionar</button>
    </div>
  </div>

  <!-- Vista mapa -->
  <div class="main" id="vista-mapa">
    <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
    <div class="sidebar">
      <div class="sidebar-header">
        Familiares
        <button class="refresh-btn" onclick="cargarMapa()" title="Actualizar">↻</button>
      </div>
      <div class="members-list" id="members-list">
        <div style="padding:20px;color:var(--muted);font-size:13px">Cargando...</div>
      </div>
    </div>
    <div id="map"></div>
  </div>

  <!-- Vista gestionar -->
  <div id="panel-agregar">
    <div class="section-card">
      <h2>Agregar familiar</h2>
      <input type="text" id="nuevo-nombre" placeholder="Nombre (ej: Mamá, Hermano)">
      <button class="btn" onclick="crearMiembro()">Crear y copiar link</button>
      <div id="nuevo-link" style="margin-top:14px;display:none">
        <div class="link-box" id="link-text" onclick="copiarLink()"></div>
        <p class="link-hint">Toca para copiar. Manda este link a tu familiar por WhatsApp.</p>
      </div>
    </div>

    <div class="section-card">
      <h2>Familiares registrados</h2>
      <div id="lista-miembros">
        <div style="color:var(--muted);font-size:13px">Cargando...</div>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let ADMIN_KEY = '';
let mapa = null;
let markers = {};
let colores = ['#6366f1','#4ade80','#f59e0b','#f87171','#38bdf8','#a78bfa','#fb923c'];
let colorMap = {};
let colorIdx = 0;
let sidebarVisible = true;
  
// ── Login ──────────────────────────────────────────────────────────────
function login() {
  const k = document.getElementById('key-input').value;
  if (!k) return;
  ADMIN_KEY = k;
  fetch('/admin/miembros', { headers: { 'x-admin-key': k } })
    .then(r => {
      if (r.ok) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        iniciarMapa();
        cargarMapa();
        setInterval(cargarMapa, 30000);
      } else {
        document.getElementById('login-err').style.display = 'block';
      }
    });
}

// ── Tabs ───────────────────────────────────────────────────────────────
function showTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'mapa') || (i === 1 && tab === 'agregar'));
  });
  document.getElementById('vista-mapa').style.display = tab === 'mapa' ? 'flex' : 'none';
  document.getElementById('panel-agregar').style.display = tab === 'agregar' ? 'block' : 'none';
  if (tab === 'agregar') cargarListaMiembros();
  if (tab === 'mapa') setTimeout(() => mapa && mapa.invalidateSize(), 100);
}

function toggleSidebar() {
  sidebarVisible = !sidebarVisible;

  const sidebar = document.querySelector('.sidebar');

  if (sidebarVisible) {
    sidebar.classList.remove('collapsed');
  } else {
    sidebar.classList.add('collapsed');
  }

  setTimeout(() => {
    if (mapa) mapa.invalidateSize();
  }, 350);
}  

// ── Mapa ───────────────────────────────────────────────────────────────
function iniciarMapa() {
  mapa = L.map('map', { zoomControl: true }).setView([20.66, -103.35], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 19
  }).addTo(mapa);
}

async function cargarMapa() {
  try {
    const r = await fetch('/admin/mapa', { headers: { 'x-admin-key': ADMIN_KEY } });
    const datos = await r.json();
    actualizarSidebar(datos);
    actualizarMarkers(datos);
  } catch(e) { console.error(e); }
}

function getColor(id) {
  if (!colorMap[id]) {
    colorMap[id] = colores[colorIdx % colores.length];
    colorIdx++;
  }
  return colorMap[id];
}

function actualizarSidebar(datos) {
  const list = document.getElementById('members-list');
  if (!datos.length) {
    list.innerHTML = '<div style="padding:20px;color:var(--muted);font-size:13px">Sin familiares aún.<br>Ve a Gestionar para agregar.</div>';
    return;
  }
  list.innerHTML = datos.map(d => {
    const color = getColor(d.id);
    const tiempo = d.enviado_en ? tiempoRelativo(d.enviado_en) : 'Sin datos';
    const bat = d.bateria != null ? ` · 🔋${d.bateria}%` : '';
    return `
      <div class="member-item" onclick="centrarEn('${d.id}')">
        <div class="member-dot" style="background:${color}"></div>
        <div class="member-info">
          <div class="member-name">${d.nombre}</div>
          <div class="member-time">${tiempo}${bat}</div>
        </div>
      </div>`;
  }).join('');
}

function actualizarMarkers(datos) {
  datos.forEach(d => {
    if (!d.lat) return;
    const color = getColor(d.id);
    const icon = L.divIcon({
      className: '',
      html: `<div style="
        background:${color};
        border:2px solid white;
        border-radius:50% 50% 50% 0;
        transform:rotate(-45deg);
        width:22px;height:22px;
        box-shadow:0 2px 6px rgba(0,0,0,.4)
      "></div>`,
      iconSize: [22, 22],
      iconAnchor: [11, 22]
    });

    const popup = `<b>${d.nombre}</b><br>
      ${tiempoRelativo(d.enviado_en)}<br>
      ${d.bateria != null ? '🔋 ' + d.bateria + '%' : ''}
      ${d.precision_m ? '<br>±' + Math.round(d.precision_m) + ' m' : ''}`;

    if (markers[d.id]) {
      markers[d.id].setLatLng([d.lat, d.lng]).setPopupContent(popup);
    } else {
      markers[d.id] = L.marker([d.lat, d.lng], { icon }).addTo(mapa).bindPopup(popup);
    }
  });
}

function centrarEn(id) {
  if (markers[id]) {
    mapa.setView(markers[id].getLatLng(), 15);
    markers[id].openPopup();

    // Auto ocultar sidebar en móvil
    if (window.innerWidth <= 768) {
      sidebarVisible = false;
      document.querySelector('.sidebar')
        .classList.add('collapsed');
    }
  }
}

// ── Gestionar ──────────────────────────────────────────────────────────
async function crearMiembro() {
  const nombre = document.getElementById('nuevo-nombre').value.trim();
  if (!nombre) return;
  const r = await fetch('/admin/miembros', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-admin-key': ADMIN_KEY },
    body: JSON.stringify({ nombre })
  });
  const data = await r.json();
  document.getElementById('link-text').textContent = data.link;
  document.getElementById('nuevo-link').style.display = 'block';
  document.getElementById('nuevo-nombre').value = '';
  navigator.clipboard.writeText(data.link).catch(() => {});
  cargarListaMiembros();
}

function copiarLink() {
  const txt = document.getElementById('link-text').textContent;
  navigator.clipboard.writeText(txt).then(() => {
    document.getElementById('link-text').textContent = '✓ Copiado!';
    setTimeout(() => document.getElementById('link-text').textContent = txt, 1500);
  });
}

async function cargarListaMiembros() {
  const r = await fetch('/admin/miembros', { headers: { 'x-admin-key': ADMIN_KEY } });
  const lista = await r.json();
  const el = document.getElementById('lista-miembros');
  if (!lista.length) {
    el.innerHTML = '<div style="color:var(--muted);font-size:13px">Sin familiares aún.</div>';
    return;
  }
  el.innerHTML = lista.map(m => `
    <div class="member-manage-item">
      <span>${m.nombre}</span>
      <button class="del-btn" onclick="eliminarMiembro('${m.id}','${m.nombre}')">Eliminar</button>
    </div>
  `).join('');
}

async function eliminarMiembro(id, nombre) {
  if (!confirm(`¿Eliminar a ${nombre}? Se borrarán todos sus datos.`)) return;
  await fetch('/admin/miembros/' + id, {
    method: 'DELETE',
    headers: { 'x-admin-key': ADMIN_KEY }
  });
  cargarListaMiembros();
  cargarMapa();
}

// ── Utilidades ─────────────────────────────────────────────────────────
function tiempoRelativo(fecha) {
  if (!fecha) return 'Sin datos';
  const str = fecha.endsWith('Z') ? fecha : fecha.replace(' ', 'T') + 'Z';
  const d = new Date(str);
  const diff = (Date.now() - d) / 1000;
  if (isNaN(diff) || diff < 0) return 'Ahora';
  const horaExacta = d.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  const fechaExacta = d.toLocaleDateString('es-MX', { day: '2-digit', month: '2-digit' });
  let relativo;
  if (diff < 60) relativo = 'Hace un momento';
  else if (diff < 3600) relativo = `Hace ${Math.floor(diff/60)} min`;
  else if (diff < 86400) relativo = `Hace ${Math.floor(diff/3600)} h`;
  else relativo = `Hace ${Math.floor(diff/86400)} dias`;
  if (diff < 86400) return `${relativo} · ${horaExacta}`;
  return `${relativo} · ${fechaExacta} ${horaExacta}`;
}
</script>
</body>
</html>
